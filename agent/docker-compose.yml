services:
  agent:
    restart: unless-stopped
    image: portabase/agent:latest
    volumes:
      - ./databases.json:/data/config.json
    environment:
      TZ: "${TZ}"
      EDGE_KEY: "${EDGE_KEY}"
      LOG_LEVEL: "${LOG_LEVEL}"
      POLLING: "${POLLING}"
      DATA_PATH: "${DATA_PATH}"
    networks:
      - portabase
    extra_hosts:
      - "localhost:host-gateway"

  db-mariadb-5e0e:
    image: mariadb:latest
    restart: unless-stopped
    networks:
      - portabase
    ports:
      - "${DB_MARIADB_5E0E_PORT}:3306"
    environment:
      - MYSQL_DATABASE=${DB_MARIADB_5E0E_DB}
      - MYSQL_USER=${DB_MARIADB_5E0E_USER}
      - MYSQL_PASSWORD=${DB_MARIADB_5E0E_PASS}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - db-mariadb-5e0e-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h localhost -u ${DB_MARIADB_5E0E_USER} -p${DB_MARIADB_5E0E_PASS}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-mariadb-5e0e-data:

networks:
  portabase:
    name: portabase_network
    external: true
