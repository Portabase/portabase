# Override the chart name used in resource names. Defaults to the chart name "portabase".
nameOverride: ""
# Override the full resource name (normally "<release>-portabase").
fullnameOverride: ""

image:
  repository: portabase/portabase
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  # Only used when service.type is NodePort. Leave empty to let Kubernetes assign one.
  nodePort: ""

resources:
  requests:
    memory: "1Gi"
    cpu: "1"
  limits:
    memory: "1Gi"
    cpu: "1"

timezone: Europe/Paris

project:
  url: http://localhost:8887
  secret: "change_me_generate_secure_secret"
  behindProxy: false

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: portabase.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Deployment update strategy.
# Default is Recreate: Portabase uses a single ReadWriteOnce PVC, which cannot be
# attached to two pods at once. A RollingUpdate would spin up a new pod before the
# old one terminates, causing a "Multi-Attach" error. Recreate stops the old pod
# first. See https://github.com/Portabase/portabase/issues/411
updateStrategy:
  type: Recreate
  # Only used when type is RollingUpdate. Keep maxSurge at 0 to avoid Multi-Attach
  # errors on the shared ReadWriteOnce volume.
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
