name: Publish Docker image for release

on:
  release:
    types: [ created ]
  push:
    tags:
      - "*.*.*"
      - "!*-*"

permissions:
  contents: read
  packages: write

jobs:


  log-draft-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Download draft tag artifact
        uses: actions/download-artifact@v4
        with:
          name: draft_tag
          path: .

      - name: Read draft tag
        id: draft
        run: |
          DRAFT_TAG=$(cat draft_tag.txt)
          echo $DRAFT_TAG
          echo "draft_tag=$DRAFT_TAG" >> $GITHUB_OUTPUT

  docker_publish:
    uses: ./.github/workflows/docker.yml
    with:
      add_latest: true
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME_2 }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD_2 }}
  publish_release:
    needs: docker_publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        if: ${{ github.event.release.draft == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          gh release edit v${{ github.ref_name }} --draft=false
        run: |
          gh release edit ${{ github.event.release.tag_name }} --draft=false

  discord_notification:
    needs: docker_publish
    uses: ./.github/workflows/discord.yml
    with:
      discord_title: "New Release: v${{ github.ref_name }}"
      discord_color: 3066993
      discord_footer: "Portabase"
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
